[build-system]
requires = ["setuptools>=77.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "daytona-adk"
version = "0.1.0"
description = "Daytona plugin for Google ADK"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    {name = "Mislav Ivanda", email = "mivanda@daytona.io"}
]
keywords = ["adk", "daytona", "sandbox", "plugin"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "google-adk>=0.1.0",
    "daytona>=0.194.0,<0.195.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
    "mypy>=1.0.0",
]

[project.urls]
Homepage = "https://github.com/daytona/integrations/tree/main/packages/adk-plugin#readme"
Repository = "https://github.com/daytona/integrations"
Documentation = "https://github.com/daytona/integrations/tree/main/packages/adk-plugin#readme"
Issues = "https://github.com/daytona/integrations/issues"

[tool.setuptools]
packages = ["daytona_adk"]

[tool.black]
line-length = 100
target-version = ['py310']

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
