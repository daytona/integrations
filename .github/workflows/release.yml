# Release + publish orchestrator for every versioned package in packages/.
#
# HOW IT WORKS
#   1. On every push to main, release-please inspects the conventional commits
#      that have landed and maintains ONE rolling "Release PR" per package
#      (separate-pull-requests: true in release-please-config.json).
#   2. Nothing is published while that PR sits open. The moment you MERGE a
#      package's Release PR, release-please tags it (e.g. daytona-adk-v0.1.3),
#      creates the GitHub Release, and sets that package's `--release_created`
#      output to "true".
#   3. The publish job for that package then runs IN THIS SAME WORKFLOW RUN.
#
# WHY PUBLISHING LIVES HERE (and not in separate publish-*.yml files)
#   GitHub deliberately does NOT trigger new workflow runs from events created
#   with the built-in GITHUB_TOKEN. release-please creates tags/releases with
#   GITHUB_TOKEN, so a separate workflow keyed on `push: tags` or
#   `release: published` would silently never fire — unless we introduced a
#   long-lived Personal Access Token, which we explicitly do not want.
#   Gating publish jobs on release-please's outputs in the same run is the
#   tokenless, OIDC-friendly pattern. It also means every package's Trusted
#   Publisher (PyPI/npm) registers the SAME workflow filename: release.yml
#
# AUTH: OIDC Trusted Publishing only — no NPM_TOKEN / PYPI_TOKEN secrets.
#   See the one-time setup checklist in the repo's contributing notes.

name: release-please

on:
  push:
    branches:
      - main

# No permissions by default; each job opts into exactly what it needs.
permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      adk_released: ${{ steps.release.outputs['packages/adk-plugin--release_created'] }}
      adk_tag: ${{ steps.release.outputs['packages/adk-plugin--tag_name'] }}
      langchain_released: ${{ steps.release.outputs['packages/langchain-data-analysis--release_created'] }}
      langchain_tag: ${{ steps.release.outputs['packages/langchain-data-analysis--tag_name'] }}
      n8n_released: ${{ steps.release.outputs['packages/n8n-nodes-daytona--release_created'] }}
      n8n_tag: ${{ steps.release.outputs['packages/n8n-nodes-daytona--tag_name'] }}
      pi_released: ${{ steps.release.outputs['packages/pi-extension--release_created'] }}
      pi_tag: ${{ steps.release.outputs['packages/pi-extension--tag_name'] }}
      opencode_released: ${{ steps.release.outputs['packages/opencode-plugin--release_created'] }}
      opencode_tag: ${{ steps.release.outputs['packages/opencode-plugin--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ---- PyPI: daytona-adk (setuptools) -------------------------------------
  publish-adk:
    needs: release-please
    if: needs.release-please.outputs.adk_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC -> PyPI Trusted Publishing
      contents: read
    # environment: pypi   # optional but recommended; create it in repo
    #                     # settings and match it in the Trusted Publisher.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist + wheel
        working-directory: packages/adk-plugin
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/adk-plugin/dist

  # ---- PyPI: langchain-daytona-data-analysis (Poetry) ---------------------
  publish-langchain:
    needs: release-please
    if: needs.release-please.outputs.langchain_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC -> PyPI Trusted Publishing
      contents: read
    # environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      # `python -m build` is build-backend agnostic: it reads [build-system]
      # from pyproject.toml, so it builds this Poetry project (poetry-core)
      # without needing Poetry itself installed.
      - name: Build sdist + wheel
        working-directory: packages/langchain-data-analysis
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/langchain-data-analysis/dist

  # ---- npm: @daytona/n8n-nodes-daytona (n8n community node) ---------------
  publish-n8n:
    needs: release-please
    if: needs.release-please.outputs.n8n_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC -> npm Trusted Publishing + provenance
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
      # npm Trusted Publishing (OIDC) requires npm >= 11.5.1; the LTS Node
      # image ships an older npm, so upgrade before publishing.
      - name: Upgrade npm
        run: npm install -g npm@latest
      - name: Install, build, publish
        working-directory: packages/n8n-nodes-daytona
        # `n8n-node build` produces the n8n-compliant dist/. `prepublishOnly`
        # (n8n-node prerelease) runs automatically on `npm publish` and is
        # n8n's required validation for community nodes.
        run: |
          npm ci
          npx n8n-node build
          npm publish --provenance --access public

  # ---- npm: @daytona/pi (Pi coding-agent extension) -----------------------
  publish-pi:
    needs: release-please
    if: needs.release-please.outputs.pi_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC -> npm Trusted Publishing + provenance
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm
        run: npm install -g npm@latest
      # `--if-present` lets this same recipe serve packages that ship raw .ts
      # (no build) and packages that compile — without branching.
      - name: Install, build, publish
        working-directory: packages/pi-extension
        run: |
          npm ci
          npm run build --if-present
          npm publish --provenance --access public

  # ---- npm: @daytona/opencode (OpenCode plugin) ---------------------------
  publish-opencode:
    needs: release-please
    if: needs.release-please.outputs.opencode_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC -> npm Trusted Publishing + provenance
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm
        run: npm install -g npm@latest
      - name: Install, build, publish
        working-directory: packages/opencode-plugin
        run: |
          npm ci
          npm run build --if-present
          npm publish --provenance --access public
